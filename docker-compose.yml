services:
  bot:
    build: .
    container_name: pcopbot-bot
    command: python -m bot.main
    env_file: .env
    volumes:
      - db-data:/app/data
    restart: unless-stopped

  dashboard:
    build: .
    container_name: pcopbot-dashboard
    command: >
      streamlit run dashboard/app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
      --server.enableCORS=false
      --server.enableXsrfProtection=false
      --server.enableWebsocketCompression=false
    env_file: .env
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: pcopbot-nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/ssl.conf:ro
      - ./nginx/http-only.conf:/etc/nginx/templates/http-only.conf:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      dashboard:
        condition: service_healthy
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: pcopbot-certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: /bin/true
    # Run manually: docker compose run --rm certbot certonly ...

volumes:
  db-data:
  letsencrypt:
  certbot-www:
